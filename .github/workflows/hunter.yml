name: Group Hunter Auto-Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Hunter Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MONGO_URI: ${{ secrets.BOT_MONGO_URI }}
          BOT_MONGO_DB_NAME: ${{ secrets.BOT_MONGO_DB_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          FB_GROUP_IDS_PROFILE: ${{ secrets.FB_GROUP_IDS_PROFILE }}
          FB_GROUP_IDS_PAGE: ${{ secrets.FB_GROUP_IDS_PAGE }}
          
          FB_C_USER_1: ${{ secrets.FB_C_USER_1 }}
          FB_XS_1: ${{ secrets.FB_XS_1 }}
          FB_C_USER_2: ${{ secrets.FB_C_USER_2 }}
          FB_XS_2: ${{ secrets.FB_XS_2 }}
          FB_C_USER_3: ${{ secrets.FB_C_USER_3 }}
          FB_XS_3: ${{ secrets.FB_XS_3 }}
          FB_C_USER_4: ${{ secrets.FB_C_USER_4 }}
          FB_XS_4: ${{ secrets.FB_XS_4 }}
          FB_C_USER_5: ${{ secrets.FB_C_USER_5 }}
          FB_XS_5: ${{ secrets.FB_XS_5 }}
        run: python bot.py
